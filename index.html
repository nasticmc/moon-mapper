<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moon Mapper</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <!-- Moon globe fills the viewport -->
      <div class="surface-stage" id="surfaceStage">
        <div class="surface-shell" id="surfaceShell">
          <div class="moon-surface" id="moonSurface" aria-label="Interactive moon surface"></div>
        </div>
      </div>

      <!-- Floating controls HUD (top-left) -->
      <div class="controls-hud">
        <h1>🌕 Moon Mapper</h1>
        <div class="controls">
          <button id="zoomIn" type="button" title="Zoom in">＋</button>
          <button id="zoomOut" type="button" title="Zoom out">－</button>
          <button id="rotateLeft" type="button" title="Rotate left">⟲</button>
          <button id="rotateRight" type="button" title="Rotate right">⟳</button>
          <button id="toggleSpin" type="button" title="Toggle auto-spin">⏸</button>
          <button id="resetView" type="button" title="Reset view">⌂</button>
          <span id="zoomLabel">100%</span>
        </div>
        <p class="hint">Right-click or long-press to add a POI</p>
        <p id="syncStatus" class="sync-status" aria-live="polite"></p>
      </div>

      <!-- Review link (top-right) -->
      <a href="/review" class="review-link" target="_blank">Review POIs</a>

      <!-- NASA credit (bottom) -->
      <p class="surface-credit">
        Basemap: <a href="https://svs.gsfc.nasa.gov/4720" target="_blank" rel="noreferrer noopener">NASA LROC</a>
      </p>
    </div>

    <!-- Add POI modal (triggered by right-click / long-press) -->
    <div class="modal-backdrop" id="modalBackdrop" hidden>
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-header">
          <h2 id="modalTitle">Add Point of Interest</h2>
          <button class="modal-close" id="modalClose" type="button" aria-label="Close">✕</button>
        </div>
        <form id="poiForm">
          <label>
            Name
            <input type="text" id="poiName" required placeholder="e.g. Tycho Crater" />
          </label>
          <label>
            Description
            <textarea id="poiDescription" rows="3" placeholder="Why this location matters"></textarea>
          </label>
          <div class="coord-grid">
            <label>
              Latitude
              <input type="number" id="poiLat" min="-90" max="90" step="0.1" required />
            </label>
            <label>
              Longitude
              <input type="number" id="poiLon" min="-180" max="180" step="0.1" required />
            </label>
          </div>
          <label>
            Upload images / materials
            <input type="file" id="poiFiles" accept="image/*,.pdf,.txt,.md,.doc,.docx" multiple />
          </label>
          <label>
            Resource links (comma-separated)
            <input type="text" id="poiLinks" placeholder="https://... , https://..." />
          </label>
          <div class="modal-actions">
            <button type="submit">Add POI</button>
            <button type="button" id="cancelModal">Cancel</button>
          </div>
        </form>
      </div>
    </div>

    <!-- POI detail panel (slides in from right when a marker is clicked) -->
    <div class="detail-panel" id="detailPanel">
      <div class="detail-panel-header">
        <h2>Point Details</h2>
        <button class="panel-close" id="panelClose" type="button" aria-label="Close">✕</button>
      </div>
      <div id="poiList" class="poi-list"></div>
    </div>

    <template id="poiTemplate">
      <article class="poi-card">
        <h3></h3>
        <p class="poi-desc"></p>
        <p class="poi-coords"></p>
        <div class="poi-links"></div>
        <div class="poi-files"></div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
